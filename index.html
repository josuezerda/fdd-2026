<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fiesta de Disfraces 2026</title>
<meta name="description" content="Fiesta de Disfraces 2026 · Hawkins Edition — Santiago del Estero.">
<link rel="icon" type="image/png" href="logo-st.png">
<link rel="apple-touch-icon" href="logo-st.png">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#c41e3a;--neon-red:#ff1442;--blue:#4fc3f7;--black:#020005}
html,body{height:100%;background:var(--black);color:#fff;overflow:hidden;font-family:'Special Elite',cursive}

/* FONDO */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0}
.scanline{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.005) 2px,rgba(255,255,255,.005) 4px);pointer-events:none;z-index:1}
.vignette{position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(80,0,0,.15) 0%,rgba(0,0,0,.92) 100%);pointer-events:none;z-index:1}
#lightning{position:fixed;inset:0;pointer-events:none;z-index:1}
#lglow{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,20,66,.13),transparent 70%);opacity:0;pointer-events:none;transition:opacity .15s}

/* CENTRO */
.center{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(20px,4vh,40px);padding:20px}

/* LOGO */
.logo-img{
  width:clamp(260px,45vw,520px);
  height:auto;
  filter:drop-shadow(0 0 40px rgba(255,20,66,.6)) drop-shadow(0 0 90px rgba(196,30,58,.35));
  animation:float 5s ease-in-out infinite
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* BADGE */
.classified{
  font-size:clamp(.55rem,1.1vw,.72rem);
  letter-spacing:.4em;
  color:var(--neon-red);
  text-transform:uppercase;
  border:1px solid rgba(196,30,58,.5);
  padding:8px 24px;
  display:inline-block;
  animation:flicker 8s infinite;
  background:rgba(196,30,58,.04);
  backdrop-filter:blur(4px)
}
@keyframes flicker{0%,91%,94%,98%,100%{opacity:1}92%,96%{opacity:.1}}

/* FOOTER */
.cs-footer{
  position:fixed;bottom:16px;left:0;right:0;text-align:center;
  font-size:.52rem;letter-spacing:.2em;color:rgba(255,255,255,.1);
  text-transform:uppercase;z-index:2
}
.cs-footer span{color:rgba(196,30,58,.3)}
</style>
</head>
<body>

<div id="particles"></div>
<div class="scanline"></div>
<div class="vignette"></div>
<div id="lightning"><div id="lglow"></div></div>

<div class="center">
  <img class="logo-img" src="logo-st.png" alt="Fiesta de Disfraces 2026">
  <div class="classified">⚠ &nbsp; Acceso Clasificado — Hawkins Lab &nbsp; ⚠</div>
</div>

<div class="cs-footer">Fiesta de Disfraces 2026 · Santiago del Estero · Desarrollado por <span>Fusión IA - Fuego Creativo</span></div>

<script>
// ── PARTÍCULAS ──
const pc=document.getElementById('particles');
for(let i=0;i<60;i++){
  const el=document.createElement('div');
  const sz=Math.random()*3.5+1;
  const r=Math.random()>.5;
  el.style.cssText=`position:absolute;border-radius:50%;width:${sz}px;height:${sz}px;background:rgba(${r?'255,20,66':'79,195,247'},.28);left:${Math.random()*100}%;top:${Math.random()*100}%;animation:sp ${14+Math.random()*22}s ${Math.random()*14}s linear infinite`;
  pc.appendChild(el);
}
const ks=document.createElement('style');
ks.textContent='@keyframes sp{0%{transform:translateY(0) scale(1);opacity:.28}50%{opacity:.6}100%{transform:translateY(-120vh) scale(0);opacity:0}}';
document.head.appendChild(ks);

// ── RAYOS ──
function makeBolt(){
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  const h=400+Math.random()*400,w=80;
  svg.setAttribute('width',w);svg.setAttribute('height',h);
  svg.style.cssText='position:absolute;top:0;overflow:visible;pointer-events:none';
  let d=`M${w/2} 0`,y=0;
  while(y<h){const s=30+Math.random()*50;y+=s;d+=` L${10+Math.random()*(w-20)} ${y}`;}
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  const f=document.createElementNS('http://www.w3.org/2000/svg','filter');
  f.setAttribute('id','bg');f.setAttribute('x','-200%');f.setAttribute('y','-20%');f.setAttribute('width','500%');f.setAttribute('height','140%');
  const bl=document.createElementNS('http://www.w3.org/2000/svg','feGaussianBlur');
  bl.setAttribute('stdDeviation','10');bl.setAttribute('result','cb');
  const mg=document.createElementNS('http://www.w3.org/2000/svg','feMerge');
  ['cb','cb','SourceGraphic'].forEach(n=>{const mn=document.createElementNS('http://www.w3.org/2000/svg','feMergeNode');mn.setAttribute('in',n);mg.appendChild(mn);});
  f.appendChild(bl);f.appendChild(mg);defs.appendChild(f);
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',d);p.setAttribute('stroke','#ff1442');p.setAttribute('stroke-width',3+Math.random()*4);
  p.setAttribute('fill','none');p.setAttribute('filter','url(#bg)');p.setAttribute('stroke-linecap','round');
  const c=document.createElementNS('http://www.w3.org/2000/svg','path');
  c.setAttribute('d',d);c.setAttribute('stroke','rgba(255,210,210,.85)');c.setAttribute('stroke-width','1.5');
  c.setAttribute('fill','none');c.setAttribute('stroke-linecap','round');
  svg.appendChild(defs);svg.appendChild(p);svg.appendChild(c);
  return svg;
}
function spawnBolt(){
  const lc=document.getElementById('lightning'),glow=document.getElementById('lglow');
  const bolt=makeBolt();
  bolt.style.left=(3+Math.random()*88)+'%';bolt.style.top='0';bolt.style.opacity='0';
  lc.appendChild(bolt);
  setTimeout(()=>{bolt.style.transition='opacity .12s ease-in';bolt.style.opacity='1';if(glow){glow.style.transition='opacity .12s';glow.style.opacity='1';}},10);
  setTimeout(()=>{bolt.style.transition='opacity .08s';bolt.style.opacity='.2';if(glow)glow.style.opacity='.2';},180);
  setTimeout(()=>{bolt.style.transition='opacity .10s';bolt.style.opacity='.95';if(glow){glow.style.transition='opacity .10s';glow.style.opacity='.9';}},280);
  setTimeout(()=>{bolt.style.transition='opacity .4s ease-out';bolt.style.opacity='0';if(glow){glow.style.transition='opacity .4s';glow.style.opacity='0';}},460);
  setTimeout(()=>bolt.remove(),950);
  setTimeout(spawnBolt,5000+Math.random()*9000);
}
setTimeout(spawnBolt,2500);
</script>
</body>
</html>
