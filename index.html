<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fiesta de Disfraces 2026 · Próximamente</title>
<meta name="description" content="Fiesta de Disfraces 2026 · Hawkins Edition — Santiago del Estero. Próximamente.">
<link rel="icon" type="image/png" href="logo-st.png">
<link rel="apple-touch-icon" href="logo-st.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Special+Elite&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#c41e3a;--neon-red:#ff1442;--blue:#4fc3f7;--black:#020005}
html,body{height:100%;background:var(--black);color:#fff;overflow:hidden;font-family:'Special Elite',cursive}

/* EFECTOS DE FONDO */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0}
.scanline{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.006) 2px,rgba(255,255,255,.006) 4px);pointer-events:none;z-index:1}
.vignette{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,.9) 100%);pointer-events:none;z-index:1}
#lightning{position:fixed;inset:0;pointer-events:none;z-index:1}
#lglow{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,20,66,.15),transparent 70%);opacity:0;pointer-events:none;transition:opacity .15s}

/* CENTRO */
.center{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;gap:0}

/* LOGO */
.logo-img{width:clamp(120px,22vw,200px);height:auto;
  filter:drop-shadow(0 0 30px rgba(255,20,66,.7)) drop-shadow(0 0 70px rgba(196,30,58,.4));
  animation:float 4s ease-in-out infinite;
  margin-bottom:clamp(16px,3vh,28px)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* BADGE CLASIFICADO */
.classified{font-size:clamp(.5rem,.9vw,.65rem);letter-spacing:.35em;color:var(--neon-red);
  text-transform:uppercase;border:1px solid rgba(196,30,58,.45);
  padding:5px 18px;display:inline-block;
  animation:flicker 7s infinite;margin-bottom:clamp(18px,3.5vh,32px)}
@keyframes flicker{0%,93%,96%,99%,100%{opacity:1}94%,97%{opacity:.15}}

/* TÍTULO GRANDE */
.main-title{font-family:'Cinzel Decorative',serif;
  font-size:clamp(3rem,11vw,9rem);
  font-weight:900;line-height:.95;
  position:relative;display:inline-block;
  margin-bottom:4px}
/* glitch rojo/azul */
.main-title::before,.main-title::after{
  content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%}
.main-title::before{color:var(--neon-red);animation:g1 6s infinite;
  clip-path:polygon(0 0,100% 0,100% 45%,0 45%);opacity:.55;mix-blend-mode:screen}
.main-title::after{color:var(--blue);animation:g2 6s infinite .15s;
  clip-path:polygon(0 55%,100% 55%,100% 100%,0 100%);opacity:.45;mix-blend-mode:screen}
@keyframes g1{0%,88%,100%{transform:translate(0)}90%{transform:translate(-4px,1px)}93%{transform:translate(4px,-1px)}}
@keyframes g2{0%,88%,100%{transform:translate(0)}90%{transform:translate(4px,1px)}93%{transform:translate(-4px,-1px)}}

.sub-title{font-family:'Cinzel Decorative',serif;
  font-size:clamp(2rem,7vw,6rem);
  font-weight:900;color:var(--neon-red);
  text-shadow:0 0 30px rgba(255,20,66,.5);
  margin-bottom:clamp(14px,2.5vh,24px);line-height:1}

.edition{font-family:'Special Elite',cursive;
  font-size:clamp(.65rem,1.3vw,.9rem);
  color:rgba(255,255,255,.5);
  letter-spacing:.35em;text-transform:uppercase}

/* FOOTER */
.cs-footer{position:fixed;bottom:18px;left:0;right:0;text-align:center;
  font-size:.55rem;letter-spacing:.2em;color:rgba(255,255,255,.12);
  text-transform:uppercase;z-index:2}
.cs-footer span{color:rgba(196,30,58,.35)}

/* MOBILE */
@media(max-width:480px){
  .main-title{font-size:clamp(2.5rem,15vw,4rem)}
  .sub-title{font-size:clamp(1.8rem,11vw,3rem)}
}
</style>
</head>
<body>

<div id="particles"></div>
<div class="scanline"></div>
<div class="vignette"></div>
<div id="lightning"><div id="lglow"></div></div>

<div class="center">
  <img class="logo-img" src="logo-st.png" alt="Fiesta de Disfraces 2026">
  <div class="classified">⚠ Acceso Clasificado — Hawkins Lab ⚠</div>
  <div class="main-title" data-text="FIESTA DE">FIESTA DE</div>
  <div class="sub-title">DISFRACES</div>
  <div class="edition">2026 &middot; Hawkins Edition &middot; Edición N° 10</div>
</div>

<div class="cs-footer">Fiesta de Disfraces 2026 · Santiago del Estero · Desarrollado por <span>Fusión IA - Fuego Creativo</span></div>

<script>
// PARTÍCULAS
const pc=document.getElementById('particles');
for(let i=0;i<55;i++){
  const el=document.createElement('div');
  const sz=Math.random()*3+1;
  const isRed=Math.random()>.5;
  el.style.cssText=`position:absolute;border-radius:50%;width:${sz}px;height:${sz}px;background:rgba(${isRed?'255,20,66':'79,195,247'},.3);left:${Math.random()*100}%;top:${Math.random()*100}%;animation:sp ${12+Math.random()*20}s ${Math.random()*12}s linear infinite`;
  pc.appendChild(el);
}
const ks=document.createElement('style');
ks.textContent='@keyframes sp{0%{transform:translateY(0) scale(1);opacity:.3}50%{opacity:.65}100%{transform:translateY(-120vh) scale(0);opacity:0}}';
document.head.appendChild(ks);

// RAYOS
function makeBolt(){
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  const h=400+Math.random()*400,w=80;
  svg.setAttribute('width',w);svg.setAttribute('height',h);
  svg.style.cssText='position:absolute;top:0;overflow:visible;pointer-events:none';
  let d=`M${w/2} 0`,y=0;
  while(y<h){const step=30+Math.random()*50;y+=step;d+=` L${10+Math.random()*(w-20)} ${y}`;}
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  const f=document.createElementNS('http://www.w3.org/2000/svg','filter');
  f.setAttribute('id','bg');f.setAttribute('x','-200%');f.setAttribute('y','-20%');f.setAttribute('width','500%');f.setAttribute('height','140%');
  const bl=document.createElementNS('http://www.w3.org/2000/svg','feGaussianBlur');
  bl.setAttribute('stdDeviation','10');bl.setAttribute('result','cb');
  const mg=document.createElementNS('http://www.w3.org/2000/svg','feMerge');
  ['cb','cb','SourceGraphic'].forEach(n=>{const mn=document.createElementNS('http://www.w3.org/2000/svg','feMergeNode');mn.setAttribute('in',n);mg.appendChild(mn);});
  f.appendChild(bl);f.appendChild(mg);defs.appendChild(f);
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',d);p.setAttribute('stroke','#ff1442');p.setAttribute('stroke-width',3+Math.random()*4);
  p.setAttribute('fill','none');p.setAttribute('filter','url(#bg)');p.setAttribute('stroke-linecap','round');
  const c=document.createElementNS('http://www.w3.org/2000/svg','path');
  c.setAttribute('d',d);c.setAttribute('stroke','rgba(255,200,200,.9)');c.setAttribute('stroke-width','1.5');
  c.setAttribute('fill','none');c.setAttribute('stroke-linecap','round');
  svg.appendChild(defs);svg.appendChild(p);svg.appendChild(c);
  return svg;
}
function spawnBolt(){
  const lc=document.getElementById('lightning');
  const glow=document.getElementById('lglow');
  const bolt=makeBolt();
  bolt.style.left=(3+Math.random()*88)+'%';bolt.style.top='0';bolt.style.opacity='0';
  lc.appendChild(bolt);
  setTimeout(()=>{bolt.style.transition='opacity .12s ease-in';bolt.style.opacity='1';if(glow){glow.style.transition='opacity .12s';glow.style.opacity='1';}},10);
  setTimeout(()=>{bolt.style.transition='opacity .08s';bolt.style.opacity='.2';if(glow)glow.style.opacity='.2';},180);
  setTimeout(()=>{bolt.style.transition='opacity .10s';bolt.style.opacity='.95';if(glow){glow.style.transition='opacity .10s';glow.style.opacity='.9';}},280);
  setTimeout(()=>{bolt.style.transition='opacity .4s ease-out';bolt.style.opacity='0';if(glow){glow.style.transition='opacity .4s';glow.style.opacity='0';}},450);
  setTimeout(()=>bolt.remove(),900);
  setTimeout(spawnBolt,5000+Math.random()*9000);
}
setTimeout(spawnBolt,2000);
</script>
</body>
</html>
